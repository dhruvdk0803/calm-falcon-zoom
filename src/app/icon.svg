<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Red Background with thick black border -->
  <rect x="48" y="48" width="416" height="416" rx="80" fill="#FF2D2D" stroke="#000" stroke-width="32"/>
  
  <!-- Black Drop Shadow for the text -->
  <text x="272" y="381" font-family="system-ui, -apple-system, sans-serif" font-size="280" font-weight="900" text-anchor="middle" fill="#000">SS</text>
  
  <!-- Yellow Text with thick black outline -->
  <text x="256" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="280" font-weight="900" text-anchor="middle" fill="#FFD400" stroke="#000" stroke-width="24">SS</text>
  
  <!-- Yellow Text Fill (to cover the inner half of the stroke) -->
  <text x="256" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="280" font-weight="900" text-anchor="middle" fill="#FFD400">SS</text>
</svg>